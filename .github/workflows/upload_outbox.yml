name: Upload outbox to Firestore

on:
  push:
    paths:
      - 'ops/_outbox/*.json'

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install firebase-admin

      - name: Upload to Firestore
        env:
          FIREBASE_ADMIN_CLIENT_EMAIL: ${{ secrets.FIREBASE_ADMIN_CLIENT_EMAIL }}
          FIREBASE_ADMIN_PRIVATE_KEY: ${{ secrets.FIREBASE_ADMIN_PRIVATE_KEY }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: impact-calc-lp
        run: python ops/scripts/upload_outbox.py

      - name: Commit cleared outbox
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ops/_outbox/
          git diff --staged --quiet || git commit -m "data: clear outbox after Firestore upload [skip ci]"
          git push
